    <!--
      Desktop-first viewport for phones.
      The tracker UI is designed for desktop widths.
      On mobile, the browser will render it at 1024px width
      and let the user pinch-zoom, exactly like "Request Desktop Site".
      On actual desktop, width=device-width gives normal behaviour.
    -->
    <meta name="viewport" content="width=1024" />

    <title>JEE Tracker</title>

    <!-- Google Sign-In script removed — Firebase handles auth now -->
  </head>
